name: Build Release Artifacts 

on:
  workflow_dispatch:
    inputs:
      run_builds:
        description: "Build Android/Web/Linux/macOS artifacts"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup & Code Gen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install & Generate
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Upload temporary workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace-generated
          path: .
          include-hidden-files: true
          retention-days: 1

  test:
    name: Test
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-generated
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Run unit tests
        run: flutter test

  build_android:
    name: Build Android
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_builds }}
    needs: [setup, test]
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-generated
      - name: Set up Java & Flutter
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build_web:
    name: Build Web
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_builds }}
    needs: [setup, test]
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-generated
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build Web
        run: flutter build web --release
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

  build_linux:
    name: Build Linux
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_builds }}
    needs: [setup, test]
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-generated
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Build Linux
        run: |
          flutter build linux --release
          tar -czf linux-bundle.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: linux-bundle.tar.gz

  build_macos:
    name: Build macOS
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_builds }}
    needs: [setup, test]
    runs-on: macos-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-generated
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build macOS
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          tar -czf ${{ github.workspace }}/macos-release.tar.gz .
      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: macos-release.tar.gz

  build_windows:
      name: Build Windows
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_builds }}
      needs: [setup, test]
      runs-on: windows-latest
      steps:
        - name: Download workspace
          uses: actions/download-artifact@v4
          with:
            name: workspace-generated

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            channel: stable
            cache: true

        - name: Build Windows
          run: flutter build windows --release

        - name: Pack Windows Release
          shell: pwsh
          run: |
            # 压缩构建产物文件夹
            Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows-release.zip

        - name: Upload Windows Artifact
          uses: actions/upload-artifact@v4
          with:
            name: windows-release
            path: windows-release.zip
            if-no-files-found: error
            retention-days: 30