name: Flutter CI Build

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit tests
        run: flutter test

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web
          if-no-files-found: error
          retention-days: 30

  build_linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Dart dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('lib/**/*.dart', 'pubspec.yaml', 'analysis_options.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-cache-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-dart-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev

      - name: Build Linux Bundle
        run: flutter build linux --release

      - name: Prepare AppImage structure
        run: |
          set -euo pipefail

          APP_NAME="velotask"
          APP_DIR="AppDir"
          BUNDLE_DIR="build/linux/x64/release/bundle"
          EXECUTABLE_PATH="$BUNDLE_DIR/$APP_NAME"

          if [ ! -f "$EXECUTABLE_PATH" ]; then
            echo "Linux bundle executable not found: $EXECUTABLE_PATH"
            ls -la "$BUNDLE_DIR" || true
            exit 1
          fi

          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/usr/bin"

          cp -r "$BUNDLE_DIR"/* "$APP_DIR/usr/bin/"
          chmod +x "$APP_DIR/usr/bin/$APP_NAME"

          cat > "$APP_DIR/$APP_NAME.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=VeloTask
          Exec=$APP_NAME
          Icon=$APP_NAME
          Categories=Utility;
          Terminal=false
          EOF

          if [ -f "linux/runner/resources/app_icon.png" ]; then
            cp "linux/runner/resources/app_icon.png" "$APP_DIR/$APP_NAME.png"
          else
            cp "web/icons/Icon-512.png" "$APP_DIR/$APP_NAME.png"
          fi

          cat > "$APP_DIR/AppRun" <<EOF
          #!/usr/bin/env bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/$APP_NAME" "$@"
          EOF

          chmod +x "$APP_DIR/AppRun"

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir velotask-x86_64.AppImage

      - name: Upload Linux Bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle
          if-no-files-found: error
          retention-days: 30

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: velotask-x86_64.AppImage
          if-no-files-found: error
          retention-days: 30